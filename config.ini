# ==============================================================================
#  Arkairo Disease Detection - Configuration Profiles
#
#  Usage:
#    python disease_detection_service.py --mode dev
#    python disease_detection_service.py --mode pi5
#
#  Any value here can be overridden at runtime with CLI flags:
#    --port, --baud, --cam, --no-gui
# ==============================================================================

# -- Mode 1: Laptop development ------------------------------------------------
#    Hardware: USB webcam + Orange Cube Plus + Neo M10 GPS + ArduPilot
#    Connect Orange Cube Plus telemetry to laptop via USB/radio (same as Mission Planner)
[dev]
camera_source = 0
serial_port   = COM3
baud          = 115200
show_gui      = true

# -- Mode 2: Raspberry Pi 5 with Pi Camera -------------------------------------
#    Hardware: Pi 5 + Pi Camera Module (CSI ribbon) + FC via UART
#    Pi Camera opens as /dev/video0 when the libcamera-v4l2 bridge is active.
#    Enable UART: add  dtoverlay=uart0  to /boot/firmware/config.txt
#    Set ArduPilot: SERIAL1_BAUD=57, SERIAL1_PROTOCOL=2 (MAVLink2)
[pi5]
camera_source = 0
serial_port   = /dev/serial0
baud          = 57600
show_gui      = false
